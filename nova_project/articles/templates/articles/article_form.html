{% extends "base_layout.html" %}
{% load static %}
{% block title %}Создание или редактирование статьи{% endblock title %}
{% block content %}
<div class="row justify-content-center">
    <div class="col-md-10 col-lg-8">
        <h1>Создание или редактирование статьи</h1>
        <form class="d-grid gap-3" method="post" enctype="multipart/form-data">
            {% csrf_token %}
            <div class="form-fields">
                {{ form }}
            </div>
            <div class="mt-3">
                <button class="btn btn-primary shadow-sm" type="submit">Сохранить</button>
                <a class="btn btn-outline-secondary ms-2" href="{% url 'homepage' %}">Отмена</a>
            </div>
        </form>
    </div>
</div>
{% endblock content %}
