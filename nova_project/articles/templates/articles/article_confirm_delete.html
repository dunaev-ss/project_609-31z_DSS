{% extends "base_layout.html" %}
{% load static %}

{% block title %}NOVA | Удаление статьи{% endblock title %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-12 col-md-8 col-lg-6 text-center">
        <h1 class="mb-4 page-title fs-3 fw-bold d-md-none">Удаление статьи</h1>
        <h1 class="mb-4 page-title display-5 d-none d-md-block">Удаление статьи</h1>
        
        <p class="text-muted mb-5 fs-5">Вы действительно хотите безвозвратно удалить статью <strong>"{{ article.title }}"</strong>?</p>

        <form class="d-flex justify-content-center gap-3" method="post">
            {% csrf_token %}
            <button class="btn btn-danger shadow-sm px-4 text-uppercase fw-bold small nav-link-f1" type="submit">
                Удалить
            </button>
            <a class="btn btn-outline-secondary px-4 text-uppercase fw-bold small nav-link-f1" href="{% url 'articles:article_detail' slug=article.slug %}">
                Отмена
            </a>
        </form>
    </div>
</div>
{% endblock content %}
