{% load static %}
<!DOCTYPE html>
<html lang="ru">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Заголовок по умолчанию{% endblock title %}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" href="{% static 'css/style.css' %}">
</head>

<body class="bg-light">
    <header>
        <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
            <div class="container">

                <div class="col-lg-3 d-flex allign-items-center">
                    <a class="navbar-brand" href="/">NOVA project</a>
                </div>

                <div class="flex-grow-1 d-flex justify-content-center my-2 my-lg-0 order-lg-2">
                    <form action="{% url 'homepage' %}" method="get" style="width: 100%; max-width: 500px;">
                        <div class="input-group input-group-sm px-2">
                            <input class="form-control" type="search" name="search" placeholder="Поиск статей..."
                                value="{{ request.GET.search|default:'' }}">
                            <button class="btn btn-outline-light" type="submit">Найти</button>
                        </div>
                    </form>
                </div>

                <button class="navbar-toggler order-lg-3 ms-2" type="button" data-bs-toggle="collapse"
                    data-bs-target="#navbarNav">
                    <span class="navbar-toggler-icon"></span>
                </button>

                <div class="collapse navbar-collapse col-lg-3 order-lg-4" id="navbarNav">
                    <div class="navbar-nav ms-auto flex-row align-items-center justify-content-end mt-2 mt-lg-0">
                        {% if user.is_authenticated %}
                        <form class="d-inline" action="{% url 'accounts:logout' %}" method="post">
                            {% csrf_token %}
                            <button class="btn btn-outline-light btn-sm" type="submit">Выйти</button>
                        </form>
                        {% else %}
                        <a class="btn btn-outline-light btn-sm me-2" href="{% url 'accounts:login' %}">Войти</a>
                        <a class="btn btn-outline-light btn-sm" href="{% url 'accounts:signup' %}">Регистрация</a>
                        {% endif %}
                    </div>
                </div>

            </div>
        </nav>
    </header>

    <main class="container my-5">
        <div class="row">
            <div class="col-12">
                <div class="bg-white p-4 p-md-5 shadow-sm rounded w-100">
                    {% block content %}{% endblock content %}
                </div>
            </div>
        </div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>
</body>

</html>
